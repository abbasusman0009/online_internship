{% extends 'base.html' %}

{% block title %}Post Internship - OIMS{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2>Post a New Internship</h2>
    <form method="POST" action="{{ url_for('employer.post_internship') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title" class="form-label">Job Title</label>
            <input type="text" id="title" name="title" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="image" class="form-label">Internship Image (Optional)</label>
            <input type="file" id="image" name="image" class="form-control" accept="image/*">
        </div>

        <div class="grid grid-cols-2">
            <div class="form-group">
                <label for="location" class="form-label">Location</label>
                <input type="text" id="location" name="location" class="form-control" placeholder="e.g., Remote, New York">
            </div>
            <div class="form-group">
                <label for="duration" class="form-label">Duration</label>
                <input type="text" id="duration" name="duration" class="form-control" placeholder="e.g., 3 Months, Summer">
            </div>
        </div>

        <div class="form-group">
            <label for="skills_required" class="form-label">Skills Required (comma separated)</label>
            <input type="text" id="skills_required" name="skills_required" class="form-control" placeholder="e.g., React, Node.js">
        </div>

        <div class="form-group" style="grid-column: span 2;">
            <label for="description" class="form-label">Job Description</label>
            <!-- Include Quill stylesheet -->
            <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
            
            <div id="editor" style="height: 200px; background-color: white; border-radius: 0 0 0.375rem 0.375rem;"></div>
            <input type="hidden" id="description" name="description" required>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Post Internship</button>
            <a href="{{ url_for('employer.dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<!-- Include the Quill library -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Describe the internship role, responsibilities, and requirements...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'clean']
            ]
        }
    });

    var form = document.querySelector('form');
    form.onsubmit = function() {
        // Populate hidden form on submit
        var description = document.querySelector('input[name=description]');
        description.value = quill.root.innerHTML;
    };
</script>
{% endblock %}
