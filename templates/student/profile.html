{% extends 'base.html' %}

{% block title %}My Profile - OIMS{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2>Edit Profile</h2>
    <form method="POST" action="{{ url_for('student.profile') }}">
        <div class="grid grid-cols-2">
            <div class="form-group">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" id="first_name" name="first_name" class="form-control" value="{{ profile.first_name }}" required>
            </div>
            <div class="form-group">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" id="last_name" name="last_name" class="form-control" value="{{ profile.last_name }}" required>
            </div>
        </div>

        <div class="grid grid-cols-2">
            <div class="form-group">
                <label for="university" class="form-label">University</label>
                <input type="text" id="university" name="university" class="form-control" value="{{ profile.university or '' }}">
            </div>
            <div class="form-group">
                <label for="major" class="form-label">Major/Field of Study</label>
                <input type="text" id="major" name="major" class="form-control" value="{{ profile.major or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="skills" class="form-label">Skills (comma separated)</label>
            <input type="text" id="skills" name="skills" class="form-control" value="{{ profile.skills or '' }}" placeholder="e.g., Python, JavaScript, Data Analysis">
        </div>

        <div class="form-group">
            <label for="bio" class="form-label">Bio / About Me</label>
            <textarea id="bio" name="bio" class="form-control" rows="5">{{ profile.bio or '' }}</textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Profile</button>
            <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
