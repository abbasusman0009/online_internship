databases:
  - name: oims-db
    databaseName: oims
    user: oims_user

services:
  - type: web
    name: oims-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oims-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
